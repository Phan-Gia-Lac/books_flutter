name: Test & Build (Only)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true 

      - name: Install dependencies
        run: flutter pub get

      - name: Run Linting (Static Analysis)
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test --coverage
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: linting-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: "18.x"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release
        continue-on-error: true